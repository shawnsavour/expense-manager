name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          NEXT_PUBLIC_SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          NEXT_PUBLIC_APPSCRIPT_ENABLED: ${{ vars.APPSCRIPT_ENABLED }}
          # Set to /<repo-name> so assets resolve correctly on GitHub Pages
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      # Ensure GitHub Pages doesn't try to process the output with Jekyll
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
